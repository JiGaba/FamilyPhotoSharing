services:
  familyphotosharing:
    image: ${DOCKER_REGISTRY-}familyphotosharing
    build:
      context: .
      dockerfile: FamilyPhotoSharing/Dockerfile
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5000
      - ConnectionStrings__DbConnection=Server=mssql;Database=FamilyPhotoSharing;User=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;
      - ConnectionStrings__DbConnectionMaster=Server=mssql;User=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;
    depends_on:
      - mssql
    volumes:
      - C:/Users/gabaj/Documents/DockerTemp:/app/files
      - app-keys:/keys
    user: root
    networks:
      - dp_network

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - dp_network

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs/localhost+1.pem:/etc/nginx/certs/localhost+1.pem:ro
      - ./nginx/certs/localhost+1-key.pem:/etc/nginx/certs/localhost+1-key.pem:ro
    depends_on:
      - familyphotosharing
    networks:
      - dp_network

  vault:
    image: hashicorp/vault:1.17.3
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "s3cR3t-VAuLt-r00t-T0k3n-9f2b1c7e4a9d6f3b8e1d4c7a"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault
    networks:
      - dp_network

volumes:
  app-keys:
  mssql-data:
  vault-data:

networks:
  dp_network:
    external: false
